name: "customer-support-triage"
version: "1.0.0"
description: "A simulated customer support queue where agents route, prioritize, and resolve tickets."
entrypoint: "environment:CustomerSupportEnv"
tasks:
  - id: "task_1_easy"
    name: "Keyword Routing"
    description: "Route straightforward tickets to the correct department based on keywords."
  - id: "task_2_medium"
    name: "Sentiment Escalation"
    description: "Identify highly negative sentiment and escalate to human agents."
  - id: "task_3_hard"
    name: "Contextual Resolution"
    description: "Attempt to auto-resolve complex tickets before deciding to escalate."