name: "customer-support-triage-advanced"
version: "2.0.0"
description: "A multi-turn customer support environment featuring tool-use (Database querying), customer patience mechanics, and conflict resolution."
entrypoint: "environment:CustomerSupportEnv"
tasks:
  - id: "task_1_easy"
    name: "Zero-Shot Routing"
    description: "Standard ticket routing based on obvious user intent."
    evaluator: "default"
    grader: "default"
  - id: "task_2_medium"
    name: "Tool-Augmented Resolution"
    description: "Agent must query the mock internal database to retrieve order details before taking action."
    evaluator: "default"
    grader: "default"
  - id: "task_3_hard"
    name: "Conflicting Data Escalation"
    description: "Agent faces a hostile user reporting an issue that contradicts the database. Requires tool use and correct escalation under tight patience constraints."
    evaluator: "default"
    grader: "default"